{% extends "base.html" %}

{% block title %}
New Ticket
{% endblock %}

{% block content %}

<div class="form-card">

<h1>Create Service Request</h1>

<form method="post">

<input
type="text"
name="title"
placeholder="Issue Title"
required>

<input
type="text"
name="description"
placeholder="Issue Description"
required>

<select name="priority">

<option>Low</option>

<option>Medium</option>

<option>High</option>

<option>Critical</option>

</select>

<button type="submit">

Create Request

</button>

</form>

</div>

{% endblock %}
